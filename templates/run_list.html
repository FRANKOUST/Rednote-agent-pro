<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /><title>{{ app_name }} {{ title }}</title><style>body{font-family:Arial,sans-serif;margin:0;background:#f6f1ea;color:#1b1b1b}.wrap{max-width:960px;margin:0 auto;padding:32px}.card{background:#fff;border-radius:20px;padding:24px;border:1px solid #ead8c8}ul{padding-left:18px}a{color:#d94841}</style></head>
  <body><div class="wrap"><div class="card"><h1>{{ title }}</h1><ul>{% for item in items %}<li>{{ item.id }} - {{ item.status }} - {{ item.provider if item.provider else item.business_type }}</li>{% endfor %}</ul></div></div></body>
</html>
